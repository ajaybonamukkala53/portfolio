<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0b0f19" />
      <stop offset="50%" stop-color="#111827" />
      <stop offset="100%" stop-color="#1e1b4b" />
    </linearGradient>

    <!-- Colorful Accent Gradients for Naukri Campus Theme -->
    <linearGradient id="poly-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ec4899" /> <!-- Pink/Magenta -->
      <stop offset="50%" stop-color="#f97316" /> <!-- Orange -->
      <stop offset="100%" stop-color="#eab308" /> <!-- Gold/Yellow -->
    </linearGradient>

    <linearGradient id="naukri-blue" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0ea5e9" />
      <stop offset="100%" stop-color="#2563eb" />
    </linearGradient>

    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="6" stdDeviation="4" flood-color="#000" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="600" fill="url(#bg-grad)" />

  <!-- Geometric Abstract Shapes (Top and Bottom matching original Naukri Campus brand aesthetics) -->
  <path d="M 0 0 L 250 0 L 180 40 L 100 20 L 0 50 Z" fill="url(#poly-grad)" opacity="0.15" />
  <path d="M 800 600 L 550 600 L 620 560 L 700 580 L 800 550 Z" fill="url(#poly-grad)" opacity="0.15" />

  <!-- Borders -->
  <rect x="25" y="25" width="750" height="550" rx="15" fill="none" stroke="url(#naukri-blue)" stroke-width="2.5" opacity="0.8" />
  <rect x="35" y="35" width="730" height="530" rx="10" fill="none" stroke="url(#poly-grad)" stroke-width="1" opacity="0.5" />

  <!-- Naukri Campus Logo Header Simulation -->
  <g transform="translate(400, 85)">
    <!-- Blue Circle Icon with white stylized 'n' or campus shape -->
    <circle cx="-110" cy="-5" r="16" fill="url(#naukri-blue)" />
    <path d="M -118 3 L -118 -11 L -113 -11 C -108 -11 -105 -8 -105 -3 L -105 3 Z M -110 -3 C -110 -6 -112 -7 -114 -7 L -114 0 C -112 0 -110 -1 -110 -3 Z" fill="#ffffff" />
    <circle cx="-110" cy="-5" r="12" fill="none" stroke="#ffffff" stroke-width="1.5" />
    <text x="-85" y="5" font-family="'Outfit', 'Inter', sans-serif" font-size="20" font-weight="800" fill="#ffffff">naukri <tspan fill="#38bdf8">campus</tspan></text>
  </g>

  <!-- Title -->
  <text x="400" y="165" font-family="'Outfit', 'Inter', sans-serif" font-size="14" font-weight="600" fill="#94a3b8" text-anchor="middle" letter-spacing="3">
    CERTIFICATE OF PARTICIPATION
  </text>

  <text x="400" y="200" font-family="'Inter', sans-serif" font-size="12" fill="#64748b" text-anchor="middle">
    This is to certify that
  </text>

  <!-- Name -->
  <text x="400" y="260" font-family="'Outfit', 'Inter', sans-serif" font-size="34" font-weight="700" fill="url(#poly-grad)" text-anchor="middle" filter="url(#shadow)">
    BONAMUKKALA AJAY
  </text>
  
  <!-- Content -->
  <text x="400" y="315" font-family="'Inter', sans-serif" font-size="15" fill="#cbd5e1" text-anchor="middle">
    participated with exceptional dedication in the event
  </text>
  
  <!-- Event Name -->
  <text x="400" y="365" font-family="'Outfit', 'Inter', sans-serif" font-size="22" font-weight="800" fill="#ffffff" text-anchor="middle" filter="url(#shadow)">
    BrandQuezt #32: Festive Branding and Seasonal Buzz
  </text>

  <text x="400" y="405" font-family="'Inter', sans-serif" font-size="14" fill="#94a3b8" text-anchor="middle">
    hosted by <tspan fill="#38bdf8" font-weight="600">Naukri Campus</tspan>.
  </text>

  <!-- Seal -->
  <g transform="translate(400, 485)" filter="url(#shadow)">
    <circle cx="0" cy="0" r="28" fill="#eab308" opacity="0.15" />
    <circle cx="0" cy="0" r="24" fill="none" stroke="#eab308" stroke-width="1.5" stroke-dasharray="4 2" />
    <polygon points="0,-12 3,-3 12,-3 5,2 8,11 0,5 -8,11 -5,2 -12,-3 -3,-3" fill="#eab308" />
  </g>

  <!-- Signatures -->
  <!-- Right (Rohit Agrawal) -->
  <line x1="520" y1="490" x2="640" y2="490" stroke="#475569" stroke-width="1" />
  <text x="580" y="480" font-family="'Brush Script MT', cursive, sans-serif" font-size="20" fill="#eab308" text-anchor="middle">Rohit Agrawal</text>
  <text x="580" y="505" font-family="'Inter', sans-serif" font-size="9" fill="#64748b" text-anchor="middle">BUSINESS HEAD, NAUKRI CAMPUS</text>
  <text x="580" y="520" font-family="'Inter', sans-serif" font-size="8" fill="#475569" text-anchor="middle">CO-FOUNDER, DOSELECT</text>

  <!-- Left (Date) -->
  <text x="220" y="485" font-family="'Outfit', sans-serif" font-size="16" font-weight="600" fill="#ffffff" text-anchor="middle">2026-07-05</text>
  <line x1="160" y1="495" x2="280" y2="495" stroke="#475569" stroke-width="1" />
  <text x="220" y="515" font-family="'Inter', sans-serif" font-size="10" fill="#64748b" text-anchor="middle">DATE ISSUED</text>

  <!-- Details -->
  <text x="60" y="555" font-family="'Inter', sans-serif" font-size="9" fill="#475569" text-anchor="start">
    ID: 6a4a7889c5c5cf5905ea0e63
  </text>
  <text x="740" y="555" font-family="'Inter', sans-serif" font-size="9" fill="#475569" text-anchor="end">
    Naukri Campus Certification
  </text>
</svg>
