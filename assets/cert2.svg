<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0b0a1a" />
      <stop offset="50%" stop-color="#121026" />
      <stop offset="100%" stop-color="#1b1836" />
    </linearGradient>

    <!-- Silver/Cyan Accent Gradient -->
    <linearGradient id="silver-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e2e8f0" />
      <stop offset="50%" stop-color="#cbd5e1" />
      <stop offset="100%" stop-color="#94a3b8" />
    </linearGradient>

    <!-- Neon Purple Gradient -->
    <linearGradient id="purple-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a855f7" />
      <stop offset="100%" stop-color="#ec4899" />
    </linearGradient>

    <!-- Drop Shadow Filter -->
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="6" flood-color="#000" flood-opacity="0.5"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="600" fill="url(#bg-grad)" />

  <!-- Outer Border -->
  <rect x="25" y="25" width="750" height="550" rx="15" fill="none" stroke="url(#purple-grad)" stroke-width="3" opacity="0.8" />
  
  <!-- Inner Border -->
  <rect x="35" y="35" width="730" height="530" rx="10" fill="none" stroke="#2e1065" stroke-width="1" />

  <!-- Decorative Corner Elements -->
  <path d="M 25 60 L 60 25 M 25 70 L 70 25" stroke="url(#purple-grad)" stroke-width="2" />
  <path d="M 775 60 L 740 25 M 775 70 L 730 25" stroke="url(#purple-grad)" stroke-width="2" />
  <path d="M 25 540 L 60 575 M 25 530 L 70 575" stroke="url(#purple-grad)" stroke-width="2" />
  <path d="M 775 540 L 740 575 M 775 530 L 730 575" stroke="url(#purple-grad)" stroke-width="2" />

  <!-- Certificate Heading -->
  <text x="400" y="100" font-family="'Outfit', 'Inter', sans-serif" font-size="34" font-weight="800" fill="url(#silver-grad)" text-anchor="middle" letter-spacing="4" filter="url(#shadow)">
    CERTIFICATE OF SPECIALIZATION
  </text>
  
  <text x="400" y="135" font-family="'Inter', sans-serif" font-size="14" font-weight="500" fill="#94a3b8" text-anchor="middle" letter-spacing="2">
    THIS CERTIFICATE IS PROUDLY PRESENTED TO
  </text>

  <!-- Recipient Name -->
  <text x="400" y="215" font-family="'Outfit', 'Inter', sans-serif" font-size="38" font-weight="700" fill="#ffffff" text-anchor="middle" filter="url(#shadow)">
    Alex Mercer
  </text>
  
  <!-- Underline under Name -->
  <line x1="250" y1="235" x2="550" y2="235" stroke="url(#purple-grad)" stroke-width="2" />
  
  <!-- Certificate Body -->
  <text x="400" y="280" font-family="'Inter', sans-serif" font-size="15" fill="#94a3b8" text-anchor="middle" width="500">
    for showing outstanding mastery in advanced programming concepts and structures in
  </text>
  
  <text x="400" y="330" font-family="'Outfit', 'Inter', sans-serif" font-size="28" font-weight="700" fill="url(#purple-grad)" text-anchor="middle" filter="url(#shadow)">
    Advanced JavaScript &amp; ES6+
  </text>

  <text x="400" y="370" font-family="'Inter', sans-serif" font-size="14" fill="#64748b" text-anchor="middle">
    A specialized credentials program detailing asynchronous coding, design patterns, and Web APIs.
  </text>

  <!-- Signatures and Seals -->
  <!-- Left Signature -->
  <line x1="150" y1="480" x2="300" y2="480" stroke="#475569" stroke-width="1" />
  <text x="225" y="470" font-family="'Brush Script MT', cursive, sans-serif" font-size="24" fill="#a855f7" text-anchor="middle">Marcus Aurelius</text>
  <text x="225" y="500" font-family="'Inter', sans-serif" font-size="12" fill="#64748b" text-anchor="middle">CHIEF EXAMINER</text>

  <!-- Purple Seal -->
  <g transform="translate(400, 470)" filter="url(#shadow)">
    <circle cx="0" cy="0" r="35" fill="url(#purple-grad)" />
    <circle cx="0" cy="0" r="30" fill="none" stroke="#ffffff" stroke-width="1.5" stroke-dasharray="4 2" />
    <polygon points="0,-18 5,-5 18,-5 8,4 12,18 0,10 -12,18 -8,4 -18,-5 -5,-5" fill="#ffffff" />
    <path d="M -15,25 L -25,55 L 0,45 L 25,55 L 15,25 Z" fill="url(#purple-grad)" opacity="0.9" />
  </g>

  <!-- Right Signature -->
  <line x1="500" y1="480" x2="650" y2="480" stroke="#475569" stroke-width="1" />
  <text x="575" y="470" font-family="'Brush Script MT', cursive, sans-serif" font-size="24" fill="#a855f7" text-anchor="middle">Elena Rostova</text>
  <text x="575" y="500" font-family="'Inter', sans-serif" font-size="12" fill="#64748b" text-anchor="middle">DIRECTOR OF TRAINING</text>

  <!-- Certificate ID & Date -->
  <text x="60" y="545" font-family="'Inter', sans-serif" font-size="11" fill="#475569" text-anchor="start">
    DATE: August 2026
  </text>
  <text x="740" y="545" font-family="'Inter', sans-serif" font-size="11" fill="#475569" text-anchor="end">
    CERTIFICATE ID: CERT-JS-77312
  </text>
</svg>
