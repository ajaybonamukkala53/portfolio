<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0c0707" />
      <stop offset="50%" stop-color="#181316" />
      <stop offset="100%" stop-color="#241b21" />
    </linearGradient>

    <!-- Oracle Accent Gradient -->
    <linearGradient id="red-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff4d4d" />
      <stop offset="100%" stop-color="#b30000" />
    </linearGradient>

    <linearGradient id="gold-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffe066" />
      <stop offset="100%" stop-color="#cc9900" />
    </linearGradient>

    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="6" flood-color="#000" flood-opacity="0.5"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="600" fill="url(#bg-grad)" />

  <!-- Borders -->
  <rect x="25" y="25" width="750" height="550" rx="15" fill="none" stroke="url(#red-grad)" stroke-width="3" opacity="0.9" />
  <rect x="35" y="35" width="730" height="530" rx="10" fill="none" stroke="url(#gold-grad)" stroke-width="1" opacity="0.6" />

  <!-- Oracle Brand Red bar at top -->
  <path d="M 35 45 L 765 45 L 755 65 L 45 65 Z" fill="url(#red-grad)" opacity="0.8" />

  <!-- Header -->
  <text x="400" y="110" font-family="'Outfit', 'Inter', sans-serif" font-size="24" font-weight="900" fill="#ffffff" text-anchor="middle" letter-spacing="4" filter="url(#shadow)">
    ORACLE CERTIFIED FOUNDATIONS ASSOCIATE
  </text>
  
  <text x="400" y="145" font-family="'Inter', sans-serif" font-size="13" font-weight="500" fill="#94a3b8" text-anchor="middle" letter-spacing="2">
    This certifies that
  </text>

  <!-- Name -->
  <text x="400" y="225" font-family="'Outfit', 'Inter', sans-serif" font-size="38" font-weight="700" fill="#ffffff" text-anchor="middle" filter="url(#shadow)">
    Bonamukkala Ajay
  </text>
  
  <line x1="240" y1="245" x2="560" y2="245" stroke="url(#gold-grad)" stroke-width="2" />
  
  <!-- Content -->
  <text x="400" y="295" font-family="'Inter', sans-serif" font-size="16" fill="#cbd5e1" text-anchor="middle">
    has met all certification requirements and is recognized as an
  </text>
  
  <text x="400" y="355" font-family="'Outfit', 'Inter', sans-serif" font-size="23" font-weight="800" fill="url(#gold-grad)" text-anchor="middle" filter="url(#shadow)">
    Oracle Cloud Infrastructure 2025 Certified AI Foundations Associate
  </text>

  <text x="400" y="395" font-family="'Inter', sans-serif" font-size="14" fill="#64748b" text-anchor="middle">
    Validating core knowledge of Artificial Intelligence, Machine Learning, and OCI AI Services.
  </text>

  <!-- Signatures -->
  <!-- Left (Damien Carey) -->
  <line x1="160" y1="490" x2="280" y2="490" stroke="#475569" stroke-width="1" />
  <text x="220" y="480" font-family="'Brush Script MT', cursive, sans-serif" font-size="22" fill="url(#gold-grad)" text-anchor="middle">Damien Carey</text>
  <text x="220" y="510" font-family="'Inter', sans-serif" font-size="10" fill="#64748b" text-anchor="middle">SENIOR VICE PRESIDENT, ORACLE UNIVERSITY</text>

  <!-- Seal -->
  <g transform="translate(400, 485)" filter="url(#shadow)">
    <circle cx="0" cy="0" r="32" fill="#1e1b1b" stroke="url(#red-grad)" stroke-width="2" />
    <polygon points="0,-15 4,-4 15,-4 7,3 10,14 0,7 -10,14 -7,3 -15,-4 -4,-4" fill="url(#gold-grad)" />
    <text x="0" y="24" font-family="'Outfit', sans-serif" font-size="8" font-weight="900" fill="#ffffff" text-anchor="middle">VERIFIED</text>
  </g>

  <!-- Right (Larry Ellison) -->
  <line x1="520" y1="490" x2="640" y2="490" stroke="#475569" stroke-width="1" />
  <text x="580" y="480" font-family="'Brush Script MT', cursive, sans-serif" font-size="22" fill="url(#gold-grad)" text-anchor="middle">Larry Ellison</text>
  <text x="580" y="510" font-family="'Inter', sans-serif" font-size="11" fill="#64748b" text-anchor="middle">CHAIRMAN &amp; CTO</text>

  <!-- Details -->
  <text x="60" y="555" font-family="'Inter', sans-serif" font-size="9" fill="#475569" text-anchor="start">
    ID: 102866988OCI25AICFA
  </text>
  <text x="740" y="555" font-family="'Inter', sans-serif" font-size="9" fill="#475569" text-anchor="end">
    DATE: October 09, 2025
  </text>
</svg>
