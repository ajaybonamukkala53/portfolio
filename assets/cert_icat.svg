<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="100%" height="100%">
  <defs>
    <!-- Orange Theme Borders -->
    <linearGradient id="orange-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f97316" />
      <stop offset="100%" stop-color="#c2410c" />
    </linearGradient>

    <!-- Card Shadow -->
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="6" stdDeviation="5" flood-color="#000" flood-opacity="0.15"/>
    </filter>
  </defs>

  <!-- Background outer orange border padding -->
  <rect width="800" height="600" fill="url(#orange-grad)" />

  <!-- Inner Card (White) -->
  <rect x="40" y="40" width="720" height="520" rx="12" fill="#ffffff" filter="url(#shadow)" />

  <!-- Elegant Inner Fine Border line -->
  <rect x="50" y="50" width="700" height="500" rx="8" fill="none" stroke="#22252a" stroke-width="1.5" />
  
  <!-- Classic Ornamental Corners -->
  <path d="M 50 75 Q 75 75 75 50" fill="none" stroke="#22252a" stroke-width="1.5" />
  <path d="M 750 75 Q 725 75 725 50" fill="none" stroke="#22252a" stroke-width="1.5" />
  <path d="M 50 525 Q 75 525 75 550" fill="none" stroke="#22252a" stroke-width="1.5" />
  <path d="M 750 525 Q 725 525 725 550" fill="none" stroke="#22252a" stroke-width="1.5" />

  <!-- Logo Banner (ICAT & Secondary Orange Dot logo) -->
  <g transform="translate(400, 95)" filter="url(#shadow)">
    <!-- Left orange circle logo -->
    <circle cx="-50" cy="0" r="18" fill="#ea580c" />
    <circle cx="-50" cy="0" r="14" fill="#ffffff" />
    <rect x="-56" y="-6" width="6" height="12" fill="#ea580c" />
    <circle cx="-47" cy="0" r="4" fill="#ea580c" />

    <!-- Divider -->
    <line x1="-20" y1="-18" x2="-20" y2="18" stroke="#cbd5e1" stroke-width="1.5" />

    <!-- ICAT Text Logo -->
    <!-- Cap vector inside I -->
    <path d="M -2 0 L 5 -3 L 12 0 L 5 3 Z" fill="#22252a" transform="translate(-1, -12)" />
    <text x="10" y="8" font-family="'Outfit', 'Inter', sans-serif" font-size="24" font-weight="900" fill="#22252a">ICAT</text>
    <text x="10" y="16" font-family="'Inter', sans-serif" font-size="6" font-weight="600" fill="#475569" letter-spacing="1">INTERNSHIP COMMON APTITUDE TEST</text>
  </g>

  <!-- Title -->
  <text x="400" y="200" font-family="'Outfit', 'Inter', sans-serif" font-size="28" font-weight="800" fill="#1e293b" text-anchor="middle" letter-spacing="1">
    CERTIFICATE OF PARTICIPATION
  </text>
  <text x="400" y="222" font-family="'Inter', sans-serif" font-size="11" font-weight="600" fill="#64748b" text-anchor="middle" letter-spacing="1">
    THIS CERTIFICATE IS PROUDLY PRESENTED TO
  </text>

  <!-- Recipient Name -->
  <text x="400" y="275" font-family="'Outfit', 'Inter', sans-serif" font-size="30" font-weight="700" fill="#ea580c" text-anchor="middle">
    AJAY BONAMUKKALA
  </text>
  <line x1="200" y1="288" x2="600" y2="288" stroke="#22252a" stroke-width="1.5" />

  <!-- Description Body -->
  <text x="400" y="322" font-family="'Inter', sans-serif" font-size="13" font-weight="600" fill="#334155" text-anchor="middle">
    for participating in the Internship Common Aptitude Test.
  </text>
  <text x="400" y="345" font-family="'Inter', sans-serif" font-size="12" fill="#475569" text-anchor="middle">
    We commend your dedication and effort and extend our
  </text>
  <text x="400" y="365" font-family="'Inter', sans-serif" font-size="12" fill="#475569" text-anchor="middle">
    best wishes for your continued success and achievements
  </text>
  <text x="400" y="385" font-family="'Inter', sans-serif" font-size="12" fill="#475569" text-anchor="middle">
    in the future.
  </text>

  <!-- Footers -->
  <!-- Left Issued Date -->
  <text x="180" y="470" font-family="'Outfit', 'Inter', sans-serif" font-size="12" font-weight="700" fill="#1e293b" text-anchor="middle">22nd September, 2025</text>
  <line x1="120" y1="480" x2="240" y2="480" stroke="#cbd5e1" stroke-width="1" />
  <text x="180" y="495" font-family="'Inter', sans-serif" font-size="8" fill="#94a3b8" text-anchor="middle">Date</text>

  <!-- Right Certificate ID -->
  <text x="620" y="470" font-family="'Outfit', 'Inter', sans-serif" font-size="12" font-weight="700" fill="#1e293b" text-anchor="middle">CIT-P-2319198</text>
  <line x1="560" y1="480" x2="680" y2="480" stroke="#cbd5e1" stroke-width="1" />
  <text x="620" y="495" font-family="'Inter', sans-serif" font-size="8" fill="#94a3b8" text-anchor="middle">Certificate Number</text>

</svg>
